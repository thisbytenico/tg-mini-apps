                    option.xAxis.axisLabel.formatter = function(val, i){
                            if (i === 0) {
                                return `{start| ${val}}`
                            } else if (i === dates.length - 1) {
                                return `{end| ${val}}`
                            }  else if (i === Math.ceil(dates.length / 2)) {
                                return val
                            }
                            return val
                        };
                        option.xAxis.axisLabel.rich=richCss;
                }else{
                    option.xAxis.axisLabel.interval = function(index, value) {
                        // 只显示4个标签：第一个、1/3处、2/3处、最后一个
                        var length = dates.length;
                        return index === 0 || index === Math.floor(length/3) || index === Math.floor(2*length/3) || index === length-1;
                    }
                }
                // 使用配置项显示图表
                myChart.setOption(option,true);
        }
